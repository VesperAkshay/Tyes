name: "Release Tyegit to R2"

on:
  push:
    tags:
      - 'v*'

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            bundle_path: './target/aarch64-apple-darwin/release/bundle/'
          - platform: 'windows-latest'
            args: ''
            bundle_path: './target/release/bundle/'
          - platform: 'ubuntu-22.04'
            args: ''
            bundle_path: './target/release/bundle/'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js & pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node dependencies
        run: pnpm install

      - name: Build Design System (required by tyegit)
        run: pnpm --filter @tyes/design-system run build

      - name: Build Frontend
        run: pnpm --filter @tyes/tyegit run build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build & Sign Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: "./apps/tyegit"
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Upload Binaries to Cloudflare R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: true
          AWS_REGION: auto
        run: |
          # Use AWS CLI with Cloudflare R2 S3-compatible endpoint
          aws s3 sync ${{ matrix.bundle_path }} \
            s3://tyegit/releases/${{ github.ref_name }}/ \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

  update-manifest:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Generate latest.json for Updater & Website
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ENDPOINT="https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          BASE_URL="https://release.tyes.dev/releases/${GITHUB_REF_NAME}"
          
          echo "Dynamically finding signature files for auto-updater..."

          # Windows NSIS
          WIN_SIG_FILE=$(aws s3 ls s3://tyegit/releases/${GITHUB_REF_NAME}/nsis/ --endpoint-url $ENDPOINT | awk '{print $4}' | grep '\.sig$' | head -n 1 || echo "")
          if [ -n "$WIN_SIG_FILE" ]; then
            WIN_EXE_SIG=$(aws s3 cp s3://tyegit/releases/${GITHUB_REF_NAME}/nsis/$WIN_SIG_FILE - --endpoint-url $ENDPOINT 2>/dev/null)
            WIN_URL="$BASE_URL/nsis/${WIN_SIG_FILE%.sig}"
          fi

          # macOS
          MAC_SIG_FILE=$(aws s3 ls s3://tyegit/releases/${GITHUB_REF_NAME}/macos/ --endpoint-url $ENDPOINT | awk '{print $4}' | grep '\.sig$' | head -n 1 || echo "")
          if [ -n "$MAC_SIG_FILE" ]; then
            MAC_DMG_SIG=$(aws s3 cp s3://tyegit/releases/${GITHUB_REF_NAME}/macos/$MAC_SIG_FILE - --endpoint-url $ENDPOINT 2>/dev/null)
            MAC_URL="$BASE_URL/macos/${MAC_SIG_FILE%.sig}"
          fi

          # Linux AppImage
          LINUX_SIG_FILE=$(aws s3 ls s3://tyegit/releases/${GITHUB_REF_NAME}/appimage/ --endpoint-url $ENDPOINT | awk '{print $4}' | grep '\.sig$' | head -n 1 || echo "")
          if [ -n "$LINUX_SIG_FILE" ]; then
            LINUX_APPIMAGE_SIG=$(aws s3 cp s3://tyegit/releases/${GITHUB_REF_NAME}/appimage/$LINUX_SIG_FILE - --endpoint-url $ENDPOINT 2>/dev/null)
            LINUX_URL="$BASE_URL/appimage/${LINUX_SIG_FILE%.sig}"
          fi

          cat <<EOF > latest.json
          {
            "version": "${VERSION}",
            "notes": "Tyegit release ${GITHUB_REF_NAME}",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WIN_EXE_SIG:-}",
                "url": "${WIN_URL:-}"
              },
              "darwin-aarch64": {
                "signature": "${MAC_DMG_SIG:-}",
                "url": "${MAC_URL:-}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_APPIMAGE_SIG:-}",
                "url": "${LINUX_URL:-}"
              }
            }
          }
          EOF

          # Upload latest.json directly to R2 root
          aws s3 cp latest.json s3://tyegit/latest.json \
            --endpoint-url $ENDPOINT \
            --cache-control "no-cache, no-store, must-revalidate"

          echo "Copying installers to /latest/ for the website..."
          # Windows
          aws s3 cp s3://tyegit/releases/${GITHUB_REF_NAME}/nsis/Tyegit_${VERSION}_x64-setup.exe s3://tyegit/latest/TyeGit-Windows-x64.exe --endpoint-url $ENDPOINT || true
          
          # macOS (Apple Silicon)
          aws s3 cp s3://tyegit/releases/${GITHUB_REF_NAME}/dmg/Tyegit_${VERSION}_aarch64.dmg s3://tyegit/latest/TyeGit-Mac-Silicon.dmg --endpoint-url $ENDPOINT || true
          
          # Linux
          aws s3 cp s3://tyegit/releases/${GITHUB_REF_NAME}/appimage/Tyegit_${VERSION}_amd64.AppImage s3://tyegit/latest/TyeGit-Linux-x64.AppImage --endpoint-url $ENDPOINT || true
